<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>so tired</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

  <!-- AUDIO -->
  <audio id="bgMusic" loop>
    <source src="friends.mp3" type="audio/mpeg">
  </audio>

  <div class="container">
    <div class="centered">
      <h1>7</h1>

      <!-- PLAY BUTTON -->
      <button id="playBtn">tap to enter</button>

      <div class="icons">
        <a href="https://discord.gg/celine" target="_blank" title="Website">
          <i class="fas fa-globe"></i>
        </a>
        <a href="https://instagram.com/73fq" target="_blank" title="Instagram">
          <i class="fab fa-instagram"></i>
        </a>
        <a href="https://discord.com/users/105319454656729088" target="_blank" title="Discord">
          <i class="fab fa-discord"></i>
        </a>
      </div>
    </div>
  </div>

  <script>
    const btn = document.getElementById("playBtn");
    const music = document.getElementById("bgMusic");

    btn.addEventListener("click", () => {
      music.play();
      btn.style.display = "none";
    });
  </script>

</body>
</html>
